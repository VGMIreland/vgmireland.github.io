<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vgmireland | Portfolio Musical</title>
    <style>
        /* Estilos básicos para que no se vea feo mientras trabajamos */
        body {
            background-color: #121214;
            color: #e1e1e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #ffffff;
            margin-bottom: 5px;
            font-size: 2.5rem;
        }
        p.subtitle {
            color: #a8a8b3;
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 30px;
        }
        .player-container {
            background: #202024;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #323238;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            background-color: #41414d;
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #57576b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>vgmireland</h1>
        <p class="subtitle">Compositor y Diseñador de Sonido</p>

        <div class="player-container">
            <p style="color: #a8a8b3; padding: 20px 0;">Aquí irá tu reproductor de Bandcamp</p>
            </div>

        <div class="links">
            <a href="#" class="btn" target="_blank">Escuchar en Bandcamp</a>
            <a href="#" class="btn" target="_blank">LinkedIn</a>
            <a href="mailto:tu-correo@ejemplo.com" class="btn">Contacto por Email</a>
        </div>
    </div>

</body>
</html>
