            flex-direction: column;
            gap: 12px;

            margin: 0 auto;

            color: #ffffff;
            padding: 14px 20px;

            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid #323238;
            transition: all 0.2s ease;
        }
        .btn:hover {
