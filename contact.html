<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | VGM Ireland</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=500;700&family=Inter:wght=300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <link rel="icon" type="image/png" href="assets/favicons/favicon.png">
</head>
<body>

    <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>

    <div class="container">
        <h1>Get In Touch</h1>
        <p class="subtitle">Let's build something acoustic together</p>

        <div class="contact-grid">
            <div class="contact-info-card">
                <h2>Direct Info</h2>
                
                <div class="info-item">
                    <h3>Email</h3>
                    <p><a href="mailto:vgmireland@gmail.com">vgmireland@gmail.com</a></p>
                </div>

                <div class="info-item">
                    <h3>Discord</h3>
                    <p>YourUsername</p>
                </div>

                <div class="info-item">
                    <h3>Availability</h3>
                    <p>Open for freelance contracts, remote collaborations, and sound design queries.</p>
                </div>
            </div>

            <div class="form-container">
                <h2>Send a Message</h2>
                <form action="https://formspree.io/f/mgobjglr" method="POST">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required placeholder="Your name...">
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="your@email.com">
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required placeholder="Tell me about your project..."></textarea>
                    </div>

                    <button type="submit" class="btn-submit">Send Message</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
